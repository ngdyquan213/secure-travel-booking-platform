name: Backend CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

jobs:
  test-lint-security:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: secure_travel_booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d secure_travel_booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_ADMIN_DB: secure_travel_booking
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip==25.2
          pip install -r requirements-dev.lock
          pip install --no-deps -e .

      - name: Verify dependency graph
        run: |
          pip check

      - name: Run Ruff
        run: |
          ruff check app tests scripts

      - name: Run Bandit
        run: |
          bandit -r app -x tests

      - name: Run pip-audit
        run: |
          pip-audit

      - name: Run pytest
        run: |
          python -m pytest --cov=app --cov-report=term-missing -q

  staging-compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare staging env file
        run: |
          cp .env.staging.example .env.staging

      - name: Boot staging stack
        run: |
          docker compose --env-file .env.staging -f infra/docker/docker-compose.staging.yml up -d --build

      - name: Smoke test staging stack
        run: |
          python scripts/smoke_local_stack.py --base-url http://localhost:8080 --prometheus-url http://localhost:9090 --expected-environment staging

      - name: Tear down staging stack
        if: always()
        run: |
          docker compose --env-file .env.staging -f infra/docker/docker-compose.staging.yml down -v
