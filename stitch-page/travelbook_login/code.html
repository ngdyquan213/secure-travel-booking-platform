<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TravelBook - Sign In</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .azure-horizon-bg {
            background: radial-gradient(circle at center, #dbe1ff 0%, #f8f9fa 100%);
        }
        .auth-card-shadow {
            box-shadow: 0 40px 80px -20px rgba(0, 17, 58, 0.06);
        }
        .btn-navy-gradient {
            background: linear-gradient(135deg, #00113a 0%, #002366 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center azure-horizon-bg p-6">
<!-- Header / Logo Anchor -->
<header class="mb-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">travel_explore</span>
<h1 class="font-headline text-2xl font-extrabold tracking-tighter text-primary">TravelBook</h1>
</div>
</header>
<!-- Main Auth Canvas -->
<main class="w-full max-w-[480px] bg-surface-container-lowest rounded-[1.5rem] auth-card-shadow p-8 md:p-12 relative overflow-hidden">
<!-- Background Accent (Subtle Teal Bloom) -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-secondary-container/20 rounded-full blur-3xl"></div>
<!-- Guidance -->
<div class="mb-10 text-center md:text-left">
<h2 class="font-headline text-2xl text-primary mb-3">Welcome back.</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">
                Sign in to your account to manage your bookings and documents.
            </p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-outline px-1" for="email">Email</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 text-sm focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/60 outline-none" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="text-xs font-semibold uppercase tracking-wider text-outline" for="password">Password</label>
<a class="text-xs font-medium text-secondary hover:underline underline-offset-4" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 text-sm focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/60 outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<div class="pt-4">
<button class="w-full btn-navy-gradient text-white font-semibold py-4 rounded-xl shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Secondary Path -->
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Register</a>
</p>
</div>
<!-- Trust Microcopy -->
<div class="mt-12 flex items-center justify-center gap-2 text-outline/70">
<span class="material-symbols-outlined text-base">lock</span>
<p class="text-[11px] font-medium tracking-tight">
                Your information is protected by industry-standard encryption.
            </p>
</div>
</main>
<!-- Footer - Suppression of Nav, standard legal only -->
<footer class="mt-12 w-full max-w-[480px]">
<div class="flex flex-col items-center gap-4 text-center">
<div class="flex gap-6">
<a class="font-label text-[10px] uppercase tracking-widest text-outline hover:text-secondary transition-colors" href="#">Privacy Policy</a>
<a class="font-label text-[10px] uppercase tracking-widest text-outline hover:text-secondary transition-colors" href="#">Terms of Service</a>
<a class="font-label text-[10px] uppercase tracking-widest text-outline hover:text-secondary transition-colors" href="#">Help Center</a>
</div>
<p class="font-label text-[10px] uppercase tracking-widest text-outline/50">© 2024 TravelBook Inc.</p>
</div>
</footer>
<!-- Imagery Decoration (Optional subtle visual anchor) -->
<div class="fixed bottom-10 right-10 hidden lg:block opacity-20 pointer-events-none">
<img alt="Abstract Decoration" class="w-64 h-64 object-cover rounded-full mix-blend-multiply" data-alt="minimalist abstract architectural archway in soft daylight with clean lines and azure tones in a professional studio setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZ-ub8AxU4oNF2iX8KN19YBFUQ220rMCwkQj8CCyYj3RBu8Iy-g-vKvCNkD45lbGZrc2VlXaA-noHo7BDqYhl4QXeFOspR0a-nbVa7zg5wPoiZJSeMHMNVHYa73ePl18Cc8zaQYAtCBEQ9JhWjl9NduSutsDpQA3FWvdyHDu3SFYQ8-8JO5zKSzgVRJRTxC7CGkmMcYCtG7PSnrdroWnyyy1ece6HgwVvbkk1he1v1HgADpHU6pImt-K4Euy5Ol-acflAeylyrQS99"/>
</div>
</body></html>
