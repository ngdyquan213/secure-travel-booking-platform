[alembic]

# location of migration scripts
script_location = alembic

# add project root to PYTHONPATH
prepend_sys_path = .

# timezone for migrations
timezone = UTC

# database url (fallback, will be overridden by env.py)
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/secure_travel_booking


# ---------------------------------------------------------
# Post write hooks (optional formatting)
# ---------------------------------------------------------

[post_write_hooks]

# example:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


# ---------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic


[handlers]
keys = console


[formatters]
keys = generic


# Root logger

[logger_root]
level = WARN
handlers = console
qualname =


# SQLAlchemy logger

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


# Alembic logger

[logger_alembic]
level = INFO
handlers =
qualname = alembic


# Console handler

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


# Log formatter

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S