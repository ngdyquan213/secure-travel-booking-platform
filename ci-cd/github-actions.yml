name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests scripts

      - name: Bandit
        run: bandit -r app -x tests

      - name: Pip Audit
        run: pip-audit

  test-sqlite-or-default:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run default tests
        run: pytest -q -m "not postgres"

  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: secure_travel_booking_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d secure_travel_booking_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/secure_travel_booking_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run PostgreSQL integration tests
        run: pytest -q -m postgres tests/test_postgres_smoke.py tests/test_postgres_coupon_json.py
